name: Keep staging Supabase awake
on:
  schedule:
    - cron: '0 12 * * 3'   # Wednesdays at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Ping staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DB_DIRECT_URL }}
        run: psql "$DATABASE_URL" -c "select now();"
